<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin — Sandra Envía</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <!-- Google Identity Services (OAuth) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <div class="admin-layout" id="adminLayout">

    <!-- ── SIDEBAR ── -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <span class="logo-text">Sandra<em>Envía</em></span>
          <span class="admin-badge">Admin</span>
        </div>
        <button class="sidebar-close" id="sidebarClose" aria-label="Cerrar menú">✕</button>
      </div>

      <nav class="sidebar-nav" role="navigation">
        <a href="#/" class="nav-item" data-view="dashboard">
          <span class="nav-icon">📊</span> Dashboard
        </a>
        <a href="#/productos" class="nav-item" data-view="productos">
          <span class="nav-icon">👗</span> Productos
        </a>
        <a href="#/categorias" class="nav-item" data-view="categorias">
          <span class="nav-icon">📂</span> Categorías
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="firebase-status" id="firebaseStatus">
          <span class="status-dot"></span>
          <span class="status-text">Conectando…</span>
        </div>
        <a href="../" target="_blank" rel="noopener" class="view-site-btn">
          🌐 Ver sitio
        </a>
      </div>
    </aside>

    <!-- ── MAIN ── -->
    <div class="main-wrapper">
      <header class="topbar">
        <button class="hamburger-btn" id="menuToggle" aria-label="Abrir menú">
          <span></span><span></span><span></span>
        </button>
        <h1 class="topbar-title" id="topbarTitle">Dashboard</h1>
        <div class="topbar-actions" id="topbarActions"></div>
      </header>

      <main class="main-content" id="appContent">
        <div class="loading-screen">
          <div class="spinner"></div>
          <p>Conectando con Firebase…</p>
        </div>
      </main>
    </div>
  </div>

  <!-- ── MODAL ── -->
  <div class="modal-overlay" id="modalOverlay" aria-hidden="true">
    <div class="modal" id="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle"></h2>
        <button class="modal-close" id="modalClose" aria-label="Cerrar">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <!-- ── CONFIRM DIALOG ── -->
  <div class="modal-overlay" id="confirmOverlay" aria-hidden="true">
    <div class="modal modal-sm" role="alertdialog" aria-modal="true">
      <div class="modal-header">
        <h2 class="modal-title" id="confirmTitle">¿Confirmás?</h2>
      </div>
      <div class="modal-body">
        <p id="confirmMessage"></p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="confirmCancel">Cancelar</button>
        <button class="btn btn-danger" id="confirmOk">Eliminar</button>
      </div>
    </div>
  </div>

  <!-- ── GOOGLE PHOTOS PICKER ── -->
  <div class="modal-overlay modal-xl-overlay" id="photosOverlay" aria-hidden="true">
    <div class="modal modal-xl" role="dialog" aria-modal="true" aria-label="Elegir foto de Google Photos">
      <div class="modal-header">
        <h2 class="modal-title">📷 Elegir fotos de Google Photos</h2>
        <button class="modal-close" id="photosClose" aria-label="Cerrar">✕</button>
      </div>
      <div class="modal-body photos-modal-body">
        <!-- Sign-in prompt -->
        <div id="photosSignIn" class="photos-signin">
          <div class="photos-signin-icon">📷</div>
          <p>Conectá con tu cuenta de Google para ver tus fotos</p>
          <button class="btn btn-primary" id="btnGoogleSignIn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Conectar con Google
          </button>
        </div>

        <!-- Photos grid -->
        <div id="photosContent" style="display:none">
          <div id="photosGrid" class="photos-grid"></div>
          <div class="photos-pagination" id="photosPagination"></div>
        </div>

        <!-- Loading -->
        <div id="photosLoading" class="loading-screen" style="display:none">
          <div class="spinner"></div>
          <p id="photosLoadingMsg">Cargando fotos…</p>
        </div>
      </div>
      <div class="modal-footer">
        <span class="photos-selected-count" id="photosSelectedCount"></span>
        <button class="btn btn-ghost" id="photosCancel">Cancelar</button>
        <button class="btn btn-primary" id="photosConfirm" disabled>
          Agregar seleccionadas
        </button>
      </div>
    </div>
  </div>

  <!-- ── TOAST ── -->
  <div class="toast-container" id="toastContainer" aria-live="polite"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
