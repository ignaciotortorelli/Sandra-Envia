<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin — Sandra Envía</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script>
    (function(){var t=localStorage.getItem('se_theme');if(t==='dark')document.documentElement.dataset.theme='dark';})();
  </script>
  <!-- Google Identity Services (OAuth) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <div class="admin-layout" id="adminLayout">

    <!-- ── SIDEBAR ── -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <span class="logo-text">Sandra<em>Envía</em></span>
          <span class="admin-badge">Admin</span>
        </div>
        <button class="sidebar-close" id="sidebarClose" aria-label="Cerrar menú">✕</button>
      </div>

      <nav class="sidebar-nav" role="navigation">
        <a href="#/" class="nav-item" data-view="dashboard">
          <span class="nav-icon">📊</span> Dashboard
        </a>
        <a href="#/productos" class="nav-item" data-view="productos">
          <span class="nav-icon">👗</span> Productos
        </a>
        <a href="#/categorias" class="nav-item" data-view="categorias">
          <span class="nav-icon">📂</span> Categorías
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="firebase-status" id="firebaseStatus">
          <span class="status-dot"></span>
          <span class="status-text">Conectando…</span>
        </div>
        <div class="firebase-status" id="driveStatus">
          <span class="status-dot"></span>
          <span class="status-text">Drive: desconectado</span>
        </div>
        <button class="view-site-btn" id="driveConnectBtn" style="display:none">
          🔑 Conectar con Drive
        </button>
        <a href="../" target="_blank" rel="noopener" class="view-site-btn">
          🌐 Ver sitio
        </a>
      </div>
    </aside>

    <!-- ── MAIN ── -->
    <div class="main-wrapper">
      <header class="topbar">
        <button class="hamburger-btn" id="menuToggle" aria-label="Abrir menú">
          <span></span><span></span><span></span>
        </button>
        <h1 class="topbar-title" id="topbarTitle">Dashboard</h1>
        <div class="topbar-actions" id="topbarActions"></div>
        <button class="theme-toggle" id="themeToggle" aria-label="Activar modo oscuro">
          <svg class="icon-moon" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg class="icon-sun"  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </header>

      <main class="main-content" id="appContent">
        <div class="loading-screen">
          <div class="spinner"></div>
          <p>Conectando con Firebase…</p>
        </div>
      </main>
    </div>
  </div>

  <!-- ── MODAL ── -->
  <div class="modal-overlay" id="modalOverlay" aria-hidden="true">
    <div class="modal" id="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle"></h2>
        <button class="modal-close" id="modalClose" aria-label="Cerrar">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <!-- ── CONFIRM DIALOG ── -->
  <div class="modal-overlay" id="confirmOverlay" aria-hidden="true">
    <div class="modal modal-sm" role="alertdialog" aria-modal="true">
      <div class="modal-header">
        <h2 class="modal-title" id="confirmTitle">¿Confirmás?</h2>
      </div>
      <div class="modal-body">
        <p id="confirmMessage"></p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="confirmCancel">Cancelar</button>
        <button class="btn btn-danger" id="confirmOk">Eliminar</button>
      </div>
    </div>
  </div>

  <!-- ── TOAST ── -->
  <div class="toast-container" id="toastContainer" aria-live="polite"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
