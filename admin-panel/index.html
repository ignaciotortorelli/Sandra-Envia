<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin — Sandra Envía</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script>
    (function(){var t=localStorage.getItem('se_theme');if(t==='dark')document.documentElement.dataset.theme='dark';})();
  </script>
  <!-- Google Identity Services (OAuth) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <div class="admin-layout" id="adminLayout">

    <!-- ── SIDEBAR ── -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <span class="logo-text">Sandra<em>Envía</em></span>
          <span class="admin-badge">Admin</span>
        </div>
        <button class="sidebar-close" id="sidebarClose" aria-label="Cerrar menú">✕</button>
      </div>

      <nav class="sidebar-nav" role="navigation">
        <a href="#/" class="nav-item" data-view="dashboard">
          <span class="nav-icon">📊</span> Dashboard
        </a>
        <a href="#/productos" class="nav-item" data-view="productos">
          <span class="nav-icon">👗</span> Productos
        </a>
        <a href="#/categorias" class="nav-item" data-view="categorias">
          <span class="nav-icon">📂</span> Categorías
        </a>
        <a href="#/avisos" class="nav-item" data-view="avisos">
          <span class="nav-icon">📢</span> Avisos
        </a>
        <a href="#/testimonios" class="nav-item" data-view="testimonios">
          <span class="nav-icon">⭐</span> Testimonios
        </a>
        <a href="#/ajustes" class="nav-item" data-view="ajustes">
          <span class="nav-icon">⚙️</span> Ajustes
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="firebase-status" id="firebaseStatus">
          <span class="status-dot"></span>
          <span class="status-text">Conectando…</span>
        </div>
        <div class="firebase-status" id="driveStatus">
          <span class="status-dot"></span>
          <span class="status-text">Drive: desconectado</span>
        </div>
        <button class="view-site-btn" id="driveConnectBtn" style="display:none">
          🔑 Conectar con Drive
        </button>
        <button class="view-site-btn logout-btn" id="logoutBtn">
          🔓 Cerrar sesión
        </button>
        <a href="../" target="_blank" rel="noopener" class="view-site-btn">
          🌐 Ver sitio
        </a>
      </div>
    </aside>

    <!-- ── MAIN ── -->
    <div class="main-wrapper">
      <header class="topbar">
        <button class="hamburger-btn" id="menuToggle" aria-label="Abrir menú">
          <span></span><span></span><span></span>
        </button>
        <h1 class="topbar-title" id="topbarTitle">Dashboard</h1>
        <div class="topbar-actions" id="topbarActions"></div>
        <button class="theme-toggle" id="themeToggle" aria-label="Activar modo oscuro">
          <svg class="icon-moon" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg class="icon-sun"  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </header>

      <main class="main-content" id="appContent">
        <div class="loading-screen">
          <div class="spinner"></div>
          <p>Conectando con Firebase…</p>
        </div>
      </main>
    </div>
  </div>

  <!-- ── MODAL ── -->
  <div class="modal-overlay" id="modalOverlay" aria-hidden="true">
    <div class="modal" id="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle"></h2>
        <button class="modal-close" id="modalClose" aria-label="Cerrar">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <!-- ── CONFIRM DIALOG ── -->
  <div class="modal-overlay" id="confirmOverlay" aria-hidden="true">
    <div class="modal modal-sm" role="alertdialog" aria-modal="true">
      <div class="modal-header">
        <h2 class="modal-title" id="confirmTitle">¿Confirmás?</h2>
      </div>
      <div class="modal-body">
        <p id="confirmMessage"></p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="confirmCancel">Cancelar</button>
        <button class="btn btn-danger" id="confirmOk">Eliminar</button>
      </div>
    </div>
  </div>

  <!-- ── TOAST ── -->
  <div class="toast-container" id="toastContainer" aria-live="polite"></div>

  <!-- ── AUTH GATE ── -->
  <div id="authGate" class="auth-gate">
    <div class="auth-card">
      <div class="auth-card-logo">
        <span class="logo-text">Sandra<em>Envía</em></span>
        <span class="admin-badge">Admin</span>
      </div>
      <p class="auth-card-title">Panel de administración</p>
      <p class="auth-card-desc">Iniciá sesión con una cuenta de Google autorizada para continuar.</p>
      <button class="btn btn-primary auth-login-btn" id="authLoginBtn">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Iniciar sesión con Google
      </button>
      <p class="auth-error" id="authError" hidden></p>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
